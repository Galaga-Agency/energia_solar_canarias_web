name: Deploy ESC Web to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest changes in production directory
        run: |
          cd /home/galagaagency/proyectos/energia_solar_canarias/energia_solar_canarias_web
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Rebuild and restart esc_web container
        run: |
          cd /home/galagaagency/proyectos
          docker compose stop esc_web || true
          docker compose rm -f esc_web || true
          docker compose build esc_web
          docker compose up -d esc_web

      - name: Check esc_web status
        run: |
          sleep 5
          docker ps | grep esc_web
